<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="home-container">
        <h2>Bem-vindo, <span id="username"></span>!</h2>
        <p>Você fez login com sucesso.</p>

        <!-- Grupo de botões -->
        <div class="button-group button-group--top">
            <button id="registerUserBtn" class="admin-only" style="display: none;">Registrar Usuário</button>
            <button id="changePasswordButton">Alterar Senha</button>
            <button id="logoutButton">Sair</button>
        </div>

        <div class="home-cards">
            <section class="card">
                <h3>Lista de Usuários</h3>
                <p id="apiMessage" class="api-message"></p>
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome de Usuário</th>
                            <th>Status</th>
                            <th>Função</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Os usuários serão inseridos aqui dinamicamente -->
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <!-- Modal de Detalhes do Usuário -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Detalhes do Usuário</h3>
            <div id="modalUserDetails" class="user-details">
                <!-- Preenchido via JS -->
            </div>
            <div id="adminActions" class="button-group admin-only" style="display: none; margin-top: 20px;">
                <!-- Botões de ação para admin -->
            </div>
        </div>
    </div>

    <!-- Modal de Registro de Usuário -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Registrar Novo Usuário</h3>
            <div class="form-group">
                <label for="regUsername">Usuário:</label>
                <input type="text" id="regUsername" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Senha:</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="button-group">
                <button id="confirmRegisterBtn" class="btn-success">Registrar</button>
            </div>
            <p id="registerMessage"></p>
        </div>
    </div>

    <script type="module" src="scripts/home.js"></script>
</body>
</html>
